name: e_learning_app
description: A new Flutter project.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^3.10.1
  cloud_firestore: ^5.6.2
  firebase_auth: ^5.5.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.4
  crypto: ^3.0.6
  google_sign_in: ^6.2.1
  intl: ^0.20.2
  table_calendar: ^3.2.0
  image_picker: ^1.2.1
  firebase_storage: ^12.4.10
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_background: "#00695C"
  adaptive_icon_foreground: "assets/images/app_logo.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true

  assets:
    - assets/images/app_logo.png

